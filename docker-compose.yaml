services:
  db:
    image: postgres:18-alpine
    restart: always
    # set shared memory limit when using docker compose
    shm_size: 128mb
    # or set shared memory limit when deploy via swarm stack
    #volumes:
    #  - type: tmpfs
    #    target: /dev/shm
    #    tmpfs:
    #      size: 134217728 # 128*2^20 bytes = 128Mb
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taskmanager
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "taskmanager", "-U", "postgres"]
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      - 5432:5432
    volumes:
      - database_data:/var/lib/postgresql

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

volumes:
  database_data: